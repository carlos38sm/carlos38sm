<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Hola, soy Carlos. Construyo cosas con código.">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"></stop>
      <stop offset="100%" stop-color="#161b22"></stop>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"></stop>
      <stop offset="100%" stop-color="#a371f7"></stop>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"></stop>
      <stop offset="25%" stop-color="#58a6ff"></stop>
      <stop offset="75%" stop-color="#a371f7"></stop>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"></stop>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"></path>
    </pattern>
    <radialGradient id="fade" cx="20%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.85"></stop>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bgGrad)"></rect>
  <rect width="1200" height="340" fill="url(#grid)" opacity="0.5"></rect>
  <rect width="1200" height="340" fill="url(#fade)"></rect>

  <circle cx="940" cy="80" r="6" fill="#58a6ff">
    
    
  </circle>
  <circle cx="1020" cy="130" r="4" fill="#a371f7">
    
    
  </circle>
  <circle cx="1100" cy="90" r="3" fill="#3fb950">
    
  </circle>
  <circle cx="880" cy="180" r="3" fill="#58a6ff">
    
    
  </circle>
  <circle cx="1080" cy="200" r="2.5" fill="#a371f7">
    
  </circle>
  <circle cx="990" cy="240" r="2" fill="#3fb950">
    
  </circle>

  <g transform="translate(80, 55)">
    <circle cx="5" cy="6" r="5" fill="#3fb950">
      
    </circle>
    <text x="18" y="11" font-family="monospace" font-size="13" fill="#3fb950" letter-spacing="0.5">
      open to work · sevilla, es
    </text>
  </g>

  <text x="80" y="148" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="60" font-weight="700" fill="#e6edf3" letter-spacing="-2">
    Hola, soy Carlos.
    
  </text>
  <text x="80" y="218" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="60" font-weight="700" fill="url(#textGrad)" letter-spacing="-2">
    Construyo cosas con código.
    
  </text>

  <text font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#7d8590">
    <tspan x="80" y="265">Dev fullstack en formación. Java + Spring por detrás, Angular y TypeScript por delante.</tspan>
    <tspan x="80" y="289">Aprendiendo algo nuevo cada día, por pequeño que sea.</tspan>
    
  </text>

  <rect x="0" y="332" width="1200" height="4" fill="url(#accentLine)">
    
  </rect>
</svg>